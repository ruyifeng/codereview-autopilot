name: Update SKILL.md from PR review comments

on:
  pull_request:
    types: [closed]

jobs:
  extract-rules:
    # Only run when the PR was actually merged, not just closed
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    permissions:
      contents: write       # to push the skill-update branch
      pull-requests: write  # to open the update PR
      issues: write         # needed by gh pr create on some repo configs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push a new branch
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run rule extraction script
        id: extract
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/update-skill.js

      - name: Check if SKILL.md was changed
        id: check_changes
        run: |
          git diff --quiet SKILL.md SKILL_CANDIDATES.md 2>/dev/null && \
            echo "changed=false" >> $GITHUB_OUTPUT || \
            echo "changed=true" >> $GITHUB_OUTPUT

      - name: Push update branch and open PR
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          BRANCH="skill-update/pr-${PR_NUMBER}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete the branch if it already exists (re-run safety)
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"

          git add SKILL.md SKILL_CANDIDATES.md
          git commit -m "chore: update SKILL.md from PR #${PR_NUMBER} — ${PR_TITLE}"
          git push origin "$BRANCH"

          # Open a PR — readable diff so a human can approve or edit
          gh pr create \
            --title "chore: SKILL.md update from PR #${PR_NUMBER}" \
            --body "$(cat <<'EOF'
          ## Automated SKILL.md update

          This PR was generated by the rule-extraction workflow after PR #${PR_NUMBER} was merged.

          ### What to review
          - **SKILL.md** — promoted rules visible to all AI reviewers (BugBot, Cursor, Copilot, Claude Code, etc.)
          - **SKILL_CANDIDATES.md** — rules seen fewer than 3 times; not yet promoted

          ### What to do
          - ✅ Merge as-is if the rules look correct
          - ✏️ Edit any rule wording before merging
          - ❌ Delete a rule line if it was a one-off comment, not a real team convention
          - 🔍 Check any lines marked `⚠️ conflict` and resolve manually

          > _Rules in SKILL.md are automatically read as context by AI review tools on every future PR._
          EOF
          )" \
            --base main \
            --head "$BRANCH" \
            --label "skill-update" 2>/dev/null || \
          gh pr create \
            --title "chore: SKILL.md update from PR #${PR_NUMBER}" \
            --body "Automated rule update from merged PR #${PR_NUMBER}. See SKILL.md and SKILL_CANDIDATES.md for changes." \
            --base main \
            --head "$BRANCH"
